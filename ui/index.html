<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抖音直播回放下载器</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #ffffff;
      --ink: #1f2937;
      --brand: #0a7f5a;
      --muted: #6b7280;
      --line: #d9dfe7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #e9fff5 0%, var(--bg) 55%);
      height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #fff, #f4fffb);
    }

    .topbar button {
      border: none;
      background: var(--brand);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .topbar .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      min-height: 0;
    }

    .workspace {
      border-right: 1px solid var(--line);
      min-height: 0;
      padding: 16px;
    }

    .placeholder {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
    }

    .placeholder h3 {
      margin: 0 0 8px;
    }

    .placeholder p {
      margin: 6px 0;
      color: var(--muted);
    }

    .sidebar {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    #source-list {
      margin: 0;
      padding: 12px;
      list-style: none;
      overflow: auto;
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .item h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .url {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }

    .row {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .row button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .row .text-btn {
      border: none;
      background: transparent;
      color: var(--brand);
      padding: 0 2px;
      text-decoration: underline;
      font-size: 12px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <header class="topbar">
    <button id="discover-btn">发现视频源</button>
    <button id="toggle-sidebar">切换侧边栏</button>
    <div class="hint">该应用免费仅供学习，小红书id: 1234567890</div>
  </header>
  <main class="layout">
    <section class="workspace">
      <div class="placeholder">
        <h3>抖音复盘页面 WebView</h3>
        <p>
          该区域由同一窗口内的子 WebView 占用。
        </p>
        <p>
          如果启动后仍看到此卡片，说明子 WebView 挂载失败。
        </p>
      </div>
    </section>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <strong>已发现的 M3U8 源</strong>
        <button id="clear-btn">清空</button>
      </div>
      <ul id="source-list"></ul>
    </aside>
  </main>
  <script type="module" src="./main.js"></script>
</body>

</html>
